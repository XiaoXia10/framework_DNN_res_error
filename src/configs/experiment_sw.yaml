# ── Experiment identity ────────────────────────────────────────────────────────
name: sw_data_resolution_study
base_dir: /Users/xl3138/workspaces/data_resolution_study/lstm
dataset: sw_data

# ── Sampling strategy ─────────────────────────────────────────────────────────
# random | lhs | corners
# "corners" is recommended to anchor the power-law fit at the extremes.
sampling_strategy: corners
sampling_budget: 8

# ── Model ─────────────────────────────────────────────────────────────────────
# The model module must be listed here so the registry can import it.
model: lstm
model_modules:
  - models.lstm

# Architecture hyperparameters (passed to build_model via standard interface)
input_dim: 1
output_dim: 1
hidden_dim: 8
num_layers: 5
dropout_rate: 0.5

# ── Training ──────────────────────────────────────────────────────────────────
epochs: 100
learning_rate: 0.0001
batch_size: 16
patience: 15

# ── MC Dropout inference ───────────────────────────────────────────────────────
num_real: 150
mc_dropout_rate: 0.3

# ── Surface fitting ────────────────────────────────────────────────────────────
metric: RMSE            # which error metric to fit the surface on
scaling_form: power_law # power_law | auto
confidence: 0.95        # confidence level for extrapolated intervals
