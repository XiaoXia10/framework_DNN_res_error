# ── Experiment identity ────────────────────────────────────────────────────────
name: test_run_sw
base_dir: /Users/xl3138/workspaces/data_resolution_study/lstm # Where the training data is stored
dataset: sw_data

# ── Sampling ──────────────────────────────────────────────────────────────────
sampling_strategy: corners
sampling_budget: 4

# ── Model ─────────────────────────────────────────────────────────────────────
model: lstm
model_modules:
  - models.lstm

input_dim: 1
output_dim: 1
hidden_dim: 8
num_layers: 2
dropout_rate: 0.5

# ── Training ──────────────────────────────────────────────────────────────────
epochs: 100
learning_rate: 0.0001
batch_size: 16
patience: 15

# ── MC Dropout ─────────────────────────────────────────────────────────────────
num_real: 100
mc_dropout_rate: 0.3

# ── Surface fitting ────────────────────────────────────────────────────────────
metric: RMSE
scaling_form: power_law
confidence: 0.95